name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  # ── Native build & test (Linux, macOS, Windows) ───────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release --workspace

      - name: Test
        run: cargo test --release --workspace

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable + fmt + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ubuntu-lint-${{ hashFiles('Cargo.lock') }}
          restore-keys: ubuntu-lint-

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --release --workspace -- -D warnings

  # ── WASM build & test ─────────────────────────────────────────────────────
  wasm:
    name: WASM
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ubuntu-wasm-${{ hashFiles('Cargo.lock') }}
          restore-keys: ubuntu-wasm-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM package
        working-directory: crates/raddose3d-wasm
        run: wasm-pack build --target web --out-dir pkg

      - name: Test WASM (Node.js)
        working-directory: crates/raddose3d-wasm
        run: wasm-pack test --node

      - name: Upload WASM package
        uses: actions/upload-artifact@v7
        with:
          name: raddose3d-wasm-pkg
          path: crates/raddose3d-wasm/pkg/
          retention-days: 7

  # ── GitHub Pages ──────────────────────────────────────────────────────────
  pages:
    name: Assemble Pages site
    needs: wasm
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Download WASM package
        uses: actions/download-artifact@v8
        with:
          name: raddose3d-wasm-pkg
          path: pkg

      - name: Assemble site
        run: |
          mkdir -p site
          cp crates/raddose3d-wasm/web/index.html site/index.html
          # Fix the relative import path used during local dev: ../pkg/ → ./pkg/
          sed -i "s|'../pkg/|'./pkg/|g" site/index.html
          cp -r pkg site/pkg

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: pages
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
