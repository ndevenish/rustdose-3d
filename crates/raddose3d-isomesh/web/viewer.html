<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RADDOSE-3D Isosurface Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design tokens ──────────────────────────────────────────────────────── */
    :root {
      --bg:               #0f1117;
      --bg-raised:        #141820;
      --border:           #1e2a3a;
      --border-hover:     #253347;
      --text:             #e2e8f0;
      --text-muted:       #94a3b8;
      --text-dim:         #64748b;
      --accent:           #60a5fa;
      --btn-primary:      #2563eb;
      --btn-secondary-bg: #1e2a3a;
      --error-bg:         #2a1215;
      --error-border:     #7f1d1d;
      --error-text:       #fca5a5;
    }
    [data-theme="light"] {
      --bg:               #f8fafc;
      --bg-raised:        #ffffff;
      --border:           #e2e8f0;
      --border-hover:     #cbd5e1;
      --text:             #0f172a;
      --text-muted:       #475569;
      --text-dim:         #64748b;
      --accent:           #2563eb;
      --btn-primary:      #2563eb;
      --btn-secondary-bg: #f1f5f9;
      --error-bg:         #fff1f2;
      --error-border:     #fda4af;
      --error-text:       #be123c;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      width: 100%;
      max-width: 960px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
    }
    header p { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

    .theme-btn {
      background: var(--btn-secondary-bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .theme-btn:hover { border-color: var(--border-hover); color: var(--text); }

    .drop-zone {
      width: 100%;
      max-width: 960px;
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(96,165,250,0.04);
    }
    .drop-zone p { color: var(--text-muted); font-size: 0.95rem; }
    .drop-zone .hint { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.5rem; }

    #file-input { display: none; }

    .error {
      width: 100%;
      max-width: 960px;
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 8px;
      color: var(--error-text);
      font-size: 0.9rem;
      display: none;
    }

    .info-bar {
      width: 100%;
      max-width: 960px;
      margin-top: 1.5rem;
      display: none;
      gap: 2rem;
      flex-wrap: wrap;
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .info-bar span strong { color: var(--accent); font-weight: 600; }

    #plot-container {
      width: 100%;
      max-width: 960px;
      margin-top: 1.5rem;
      min-height: 520px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: none;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>RADDOSE-3D Isosurface Viewer</h1>
    <p>Load a pre-computed <code>.rdiso</code> file to visualise dose isosurfaces</p>
  </div>
  <button class="theme-btn" id="theme-toggle">Light mode</button>
</header>

<div class="drop-zone" id="drop-zone">
  <p>Drop a <strong>.rdiso</strong> file here, or click to browse</p>
  <p class="hint">Generated by <code>raddose3d-isomesh</code> — works from file://</p>
  <input type="file" id="file-input" accept=".rdiso" />
</div>

<div class="error" id="error-box"></div>

<div class="info-bar" id="info-bar">
  <span>Max dose: <strong id="ib-maxdose">—</strong> MGy</span>
  <span>Surfaces: <strong id="ib-surfaces">—</strong></span>
  <span>Bounds: <strong id="ib-bounds">—</strong> µm</span>
</div>

<div id="plot-container"></div>

<script>
// ── Theme toggle ─────────────────────────────────────────────────────────────
const root = document.documentElement;
const themeBtn = document.getElementById('theme-toggle');
themeBtn.addEventListener('click', () => {
  const isLight = root.getAttribute('data-theme') === 'light';
  root.setAttribute('data-theme', isLight ? 'dark' : 'light');
  themeBtn.textContent = isLight ? 'Light mode' : 'Dark mode';
});

// ── Drop zone ─────────────────────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) handleFile(fileInput.files[0]);
});

// ── Error display ─────────────────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.style.display = 'block';
}
function clearError() {
  document.getElementById('error-box').style.display = 'none';
}

// ── File handler ──────────────────────────────────────────────────────────────
async function handleFile(file) {
  clearError();
  document.getElementById('plot-container').style.display = 'none';
  document.getElementById('info-bar').style.display = 'none';

  let buf;
  try {
    buf = await decompress(file);
  } catch (e) {
    showError('Failed to decompress file: ' + e.message);
    return;
  }

  let parsed;
  try {
    parsed = parseBlob(buf);
  } catch (e) {
    showError('Failed to parse .rdiso blob: ' + e.message);
    return;
  }

  // Info bar
  const { maxDose, bounds, surfaces } = parsed;
  document.getElementById('ib-maxdose').textContent = maxDose.toFixed(3);
  document.getElementById('ib-surfaces').textContent = surfaces.length;
  document.getElementById('ib-bounds').textContent =
    `${bounds.minX.toFixed(1)}…${bounds.maxX.toFixed(1)} × ` +
    `${bounds.minY.toFixed(1)}…${bounds.maxY.toFixed(1)} × ` +
    `${bounds.minZ.toFixed(1)}…${bounds.maxZ.toFixed(1)}`;
  document.getElementById('info-bar').style.display = 'flex';

  await renderMesh(parsed);
}

// ── Gzip decompression via native DecompressionStream ────────────────────────
async function decompress(file) {
  const ds = new DecompressionStream('gzip');
  const piped = file.stream().pipeThrough(ds);
  const reader = piped.getReader();
  const chunks = [];
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  const total = chunks.reduce((n, c) => n + c.length, 0);
  const out = new Uint8Array(total);
  let off = 0;
  for (const c of chunks) { out.set(c, off); off += c.length; }
  return out.buffer;
}

// ── Binary parser ─────────────────────────────────────────────────────────────
function parseBlob(buf) {
  const dv = new DataView(buf);
  let off = 0;

  // Magic "RDISO\0"
  const magic = String.fromCharCode(
    dv.getUint8(0), dv.getUint8(1), dv.getUint8(2),
    dv.getUint8(3), dv.getUint8(4));
  if (magic !== 'RDISO') throw new Error(`Bad magic: '${magic}'`);
  off = 6;

  const version = dv.getUint8(off++);
  if (version !== 1) throw new Error(`Unsupported version: ${version}`);

  const numSurfaces = dv.getUint8(off++);

  const minX = dv.getFloat32(off, true); off += 4;
  const minY = dv.getFloat32(off, true); off += 4;
  const minZ = dv.getFloat32(off, true); off += 4;
  const maxX = dv.getFloat32(off, true); off += 4;
  const maxY = dv.getFloat32(off, true); off += 4;
  const maxZ = dv.getFloat32(off, true); off += 4;

  const maxDose = dv.getFloat32(off, true); off += 4;

  const surfaces = [];
  for (let s = 0; s < numSurfaces; s++) {
    const isoValue = dv.getFloat32(off, true); off += 4;
    const r = dv.getFloat32(off, true); off += 4;
    const g = dv.getFloat32(off, true); off += 4;
    const b = dv.getFloat32(off, true); off += 4;
    const opacity = dv.getFloat32(off, true); off += 4;

    const numVerts = dv.getUint32(off, true); off += 4;
    const numTris  = dv.getUint32(off, true); off += 4;

    const x = new Float32Array(numVerts);
    const y = new Float32Array(numVerts);
    const z = new Float32Array(numVerts);
    for (let vi = 0; vi < numVerts; vi++) {
      x[vi] = dv.getFloat32(off, true); off += 4;
      y[vi] = dv.getFloat32(off, true); off += 4;
      z[vi] = dv.getFloat32(off, true); off += 4;
    }

    const iArr = new Int32Array(numTris);
    const jArr = new Int32Array(numTris);
    const kArr = new Int32Array(numTris);
    for (let ti = 0; ti < numTris; ti++) {
      iArr[ti] = dv.getUint32(off, true); off += 4;
      jArr[ti] = dv.getUint32(off, true); off += 4;
      kArr[ti] = dv.getUint32(off, true); off += 4;
    }

    surfaces.push({ isoValue, r, g, b, opacity, x, y, z, i: iArr, j: jArr, k: kArr });
  }

  return { maxDose, bounds: { minX, minY, minZ, maxX, maxY, maxZ }, surfaces };
}

// ── Plotly mesh3d render ──────────────────────────────────────────────────────
let plotlyLoaded = false;
async function ensurePlotly() {
  if (plotlyLoaded) return;
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.plot.ly/plotly-2.35.2.min.js';
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
  plotlyLoaded = true;
}

async function renderMesh({ maxDose, bounds, surfaces }) {
  await ensurePlotly();

  const isDark = root.getAttribute('data-theme') !== 'light';
  const paperBg  = isDark ? '#141820' : '#ffffff';
  const plotBg   = isDark ? '#0f1117' : '#f8fafc';
  const textColor = isDark ? '#94a3b8' : '#475569';

  const traces = surfaces.map(s => ({
    type: 'mesh3d',
    x: Array.from(s.x),
    y: Array.from(s.y),
    z: Array.from(s.z),
    i: Array.from(s.i),
    j: Array.from(s.j),
    k: Array.from(s.k),
    color: `rgb(${Math.round(s.r*255)},${Math.round(s.g*255)},${Math.round(s.b*255)})`,
    opacity: s.opacity,
    name: `${s.isoValue.toFixed(2)} MGy`,
    showscale: false,
  }));

  const layout = {
    paper_bgcolor: paperBg,
    plot_bgcolor:  plotBg,
    font: { color: textColor, family: 'system-ui, sans-serif', size: 11 },
    margin: { l: 0, r: 0, t: 30, b: 0 },
    title: {
      text: `Dose Isosurfaces — max ${maxDose.toFixed(3)} MGy`,
      font: { size: 14, color: textColor },
    },
    scene: {
      xaxis: { title: 'X (µm)', color: textColor, gridcolor: isDark ? '#1e2a3a' : '#e2e8f0' },
      yaxis: { title: 'Y (µm)', color: textColor, gridcolor: isDark ? '#1e2a3a' : '#e2e8f0' },
      zaxis: { title: 'Z (µm)', color: textColor, gridcolor: isDark ? '#1e2a3a' : '#e2e8f0' },
      bgcolor: plotBg,
      aspectmode: 'data',
    },
    legend: { font: { color: textColor } },
  };

  const el = document.getElementById('plot-container');
  el.style.display = 'block';
  Plotly.newPlot(el, traces, layout, { responsive: true });
}
</script>

</body>
</html>
